<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cinema Map">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Cinema Venue Map v15</title>
<style>
  :root{
    --bg:#0f1117; --card:#181c25; --text:#e5e7eb; --muted:#9ca3af;
    --seat-empty:#ef4444; --seat-empty-hover:#f87171;
    --seat-filled:#22c55e; --seat-filled-hover:#4ade80;
    --tile: 46px;
    --gap: 4px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background: radial-gradient(1200px 700px at 50% -10%, #1f2635 0%, var(--bg) 55%); color:var(--text); min-height:100vh; padding:22px 10px 88px;}
  .container{max-width:1120px;margin:0 auto}
  header{text-align:center;margin-bottom:14px}
  header h1{font-size:1.32rem}
  header .ver{color:#22c55e;font-weight:700;font-size:.72rem}
  header p{color:var(--muted);font-size:.82rem;margin-top:4px}

  .legend-bar{display:flex;flex-wrap:wrap;gap:12px 20px;justify-content:center;align-items:center;margin:10px 0 14px;color:var(--muted);font-size:.82rem}
  .dot{width:15px;height:15px;border-radius:4px;display:inline-block}
  .btn{background:#252c3b;border:1px solid #364057;color:#d1d5db;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:.8rem}
  .btn:hover{background:#2e364a}
  .btn-primary{background:#22c55e;border-color:#22c55e;color:#05210f;font-weight:600}
  .btn-small{padding:5px 10px;font-size:.72rem}

  /* Row visibility dropdown */
  .row-vis-wrap{position:relative;display:inline-block}
  .row-vis-dropdown{
    position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:#171c27;border:1px solid #2b3245;border-radius:10px;padding:12px;
    min-width:180px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:100;display:none;
  }
  .row-vis-dropdown.open{display:block}
  .row-vis-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .row-vis-header span{color:#9ca3af;font-size:.72rem;font-weight:700;letter-spacing:.04em}
  .row-vis-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;max-height:180px;overflow-y:auto}
  .row-vis-item{
    background:#0f1420;border:1px solid #2a3348;border-radius:6px;padding:5px 8px;
    font-size:.72rem;font-weight:700;color:#d1d5db;cursor:pointer;user-select:none;
    min-width:32px;text-align:center;
  }
  .row-vis-item.checked{background:#22c55e;border-color:#22c55e;color:#05210f}
  .row-vis-actions{display:flex;gap:6px;justify-content:flex-end}

  .board{background:var(--card);border:1px solid #232836;border-radius:16px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:auto}

  .pov-section{margin-bottom:24px}
  .pov-wrap{width:max-content;margin:0 auto}
  .pov-title{text-align:center;font-size:.88rem;font-weight:800;letter-spacing:.06em;margin-bottom:10px;padding:7px 0;border-radius:8px;min-width:100%}
  .pov-title.av{color:#8fc8ff;background:#0e1a2e;border:1px solid #1c3a5c}
  .pov-title.podium{color:#f5a9d0;background:#2a1426;border:1px solid #5c2850}

  .floor{
    display: grid;
    grid-template-columns: repeat(14, var(--tile));
    gap: var(--gap);
    margin: 0 auto;
    width: max-content;
    position: relative;
  }
  .cell{
    width: var(--tile);
    height: 38px;
    border-radius: 7px;
    display:flex;align-items:center;justify-content:center;
    font-size:.58rem; font-weight:700; text-align:center; line-height:1.15;
    user-select:none; overflow:hidden; position:relative;
  }
  .seat{
    background: var(--seat-empty); color:#fff; cursor:pointer;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.22), 0 2px 5px rgba(0,0,0,.2);
    transition: transform .07s, background .12s;
  }
  .seat:hover{ background: var(--seat-empty-hover); transform: translateY(-1px);}
  .seat.filled{ background: var(--seat-filled); color:#05210f; }
  .seat .nm{ display:block;overflow:hidden;word-break:break-word;padding:2px; font-size:.6rem;line-height:1.1;}
  .seat.readonly{ cursor:default; }
  .seat.readonly:hover{ background: var(--seat-empty); transform: none; }
  .seat.readonly.filled:hover{ background: var(--seat-filled); }

  .space{ background: transparent; box-shadow:none; }
  .screen-block{ background:#d6dbe6; color:#1d2636; border:1px solid #a0aec0; }
  .podium-block{ background:#87ceeb; color:#1d2636; border:1px solid #5bb0cc; }
  .r2-podium{ background:#87ceeb; color:#1d2636; border:1px solid #5bb0cc; }
  .exit-q{ background:#0d2b1c; color:#7eeda8; border:1px solid #1f5c3a; }
  .door{ background:#2d2016; color:#e8c49a; }
  .wall-row{ height:3px !important; background:transparent; border-radius:0; padding:0; display:block; }
  .wall-line{ width:100%; height:2px; background:linear-gradient(90deg, transparent 2%, #475569 2%, #475569 98%, transparent 98%); }
  .wall-line.door{ background:linear-gradient(90deg, transparent 2%, #8b5a2b 2%, #8b5a2b 98%, transparent 98%); }
  .label-row{ color:#61708c; font-weight:800; background: transparent; box-shadow: none; }

  .merge { z-index: 2; }

  .stats{font-variant-numeric:tabular-nums}

  .bottom-nav{position:fixed;left:0;right:0;bottom:0;background:rgba(17,20,29,.96);border-top:1px solid #262d3d;display:flex;justify-content:center;gap:10px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));z-index:200}
  .nav-btn{background:#1d2331;color:#b9c2d5;border:1px solid #2c3448;padding:9px 22px;border-radius:999px;font-weight:700;font-size:.84rem;cursor:pointer}
  .nav-btn:hover{background:#252d40}

  .modal-overlay{position:fixed;inset:0;background:rgba(5,7,12,.7);display:none;align-items:center;justify-content:center;z-index:9999}
  .modal-overlay.open{display:flex}
  .modal{background:#171c27;border:1px solid #2b3245;border-radius:14px;padding:20px;width:min(92vw,370px);box-shadow:0 30px 80px rgba(0,0,0,.55);position:relative}
  .modal h3{font-size:1.03rem;margin-bottom:4px}
  .modal p{color:var(--muted);font-size:.82rem;margin-bottom:12px}
  .modal input{width:100%;background:#10141d;border:1px solid #2f374c;color:var(--text);border-radius:9px;padding:11px 12px;font-size:.95rem;outline:none}
  .modal input:focus{border-color:#22c55e}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:13px}
  /* Yellow name popup for podium view */
  .name-popup-overlay{position:fixed;inset:0;background:rgba(5,7,12,.85);display:none;align-items:center;justify-content:center;z-index:9998}
  .name-popup-overlay.open{display:flex}
  .name-popup{background:#fbbf24;border-radius:16px;padding:40px 60px;box-shadow:0 20px 60px rgba(251,191,36,.3);min-width:280px;text-align:center}
  .name-popup .name-text{color:#1f2937;font-size:2rem;font-weight:900;letter-spacing:.05em;text-transform:uppercase;word-break:break-word}
  .name-popup .seat-id{color:#4b5563;font-size:.85rem;margin-top:10px;font-weight:700}
  .toast.show{opacity:1}

  @media (max-width:720px){
    :root{ --tile: 32px; }
    .cell{ height: 30px; font-size:.48rem;}
    .seat .nm{ font-size:.5rem;}
    .board{ padding:10px 8px;}
  }
</style>
</head>
<body>
<div class="container">

  <div class="legend-bar">
    <span><span class="dot" style="background:var(--seat-empty)"></span> Empty</span>
    <span><span class="dot" style="background:var(--seat-filled)"></span> Reserved</span>
    <span class="stats" id="stats">0 reserved</span>
    <button class="btn" id="resetBtn" type="button" onclick="doReset()">Reset all</button>
    <button class="btn btn-primary" id="fitBtn" type="button">Fit to screen</button>
    <div class="row-vis-wrap">
      <button class="btn" id="rowVisBtn" type="button" onclick="toggleRowVis()">Rows</button>
      <div class="row-vis-dropdown" id="rowVisDropdown">
        <div class="row-vis-header">
          <span>Select visible rows</span>
          <button class="btn btn-small" onclick="selectAllRows(event)" style="font-size:.62rem;padding:3px 8px">All</button>
        </div>
        <div class="row-vis-list" id="rowVisList"></div>
        <div class="row-vis-actions">
          <button class="btn btn-small" onclick="closeRowVis(event)">Cancel</button>
          <button class="btn btn-primary btn-small" onclick="applyRowVis(event)">Apply</button>
        </div>
      </div>
    </div>
  </div>

  <div id="resetConfirm" style="display:none;text-align:center;margin:10px 0;padding:12px;background:#7f1d1d;border:1px solid #991b1b;border-radius:10px;color:#fca5a5;font-size:.82rem;">
    <p style="margin-bottom:10px;">Are you sure you want to clear ALL reservations?</p>
    <button class="btn" type="button" onclick="cancelReset()" style="margin-right:8px;">No, Cancel</button>
    <button class="btn" type="button" onclick="confirmReset()" style="background:#22c55e;border-color:#22c55e;color:#05210f;font-weight:600;">Yes, Clear All</button>
  </div>

  <div class="board" id="board">
    <div class="pov-section" id="povView">
      <div class="pov-wrap">
        <div class="pov-title av" id="povTitle">🎥 AV</div>
        <div class="floor" id="floor"></div>
      </div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="nav-btn" id="navAvPov" type="button" style="background:#1c2d48;color:#8fc8ff;border-color:#2c4a78" onclick="switchPOV('av')">🎥 Operator</button>
  <button class="nav-btn" id="navPodiumPov" type="button" onclick="switchPOV('podium')">🎥 Podium</button>
</nav>

<div class="toast" id="toast"></div>

<!-- Yellow name popup for podium view -->
<div class="name-popup-overlay" id="namePopupOverlay" onclick="closeNamePopup()">
  <div class="name-popup" onclick="event.stopPropagation()">
    <div class="name-text" id="namePopupText"></div>
    <div class="seat-id" id="namePopupSeatId"></div>
  </div>
</div>

<div id="modalOverlay" style="position:fixed;inset:0;background:rgba(5,7,12,.7);display:none;align-items:flex-start;justify-content:center;z-index:9999;padding-top:12vh;" onclick="if(event.target===this)doCancel()">
  <div id="modalBox" style="background:#171c27;border:1px solid #2b3245;border-radius:14px;padding:20px;width:min(92vw,370px);box-shadow:0 30px 80px rgba(0,0,0,.55);">
    <h3 id="modalTitle" style="font-size:1.03rem;margin-bottom:4px;color:#e5e7eb">Reserve</h3>
    <p style="color:#9ca3af;font-size:.82rem;margin-bottom:12px">Enter name – it will appear on the seat.</p>
    <input id="nameInput" type="text" maxlength="32" placeholder="Name" style="width:100%;background:#10141d;border:1px solid #2f374c;color:#e5e7eb;border-radius:9px;padding:11px 12px;font-size:.95rem;outline:none;box-sizing:border-box;text-transform:lowercase;" oninput="this.value=this.value.toLowerCase()" onkeydown="if(event.key==='Enter'){event.preventDefault();doSave()}if(event.key==='Escape'){event.preventDefault();doCancel()}">
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:13px;">
      <button id="clearBtn" type="button" onclick="doClear()" style="margin-right:auto;display:none;background:#7f1d1d;border:1px solid #991b1b;color:#fca5a5;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:700">Clear</button>
      <button type="button" onclick="doCancel()" style="background:#252c3b;border:1px solid #364057;color:#d1d5db;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:.8rem">Cancel</button>
      <button type="button" onclick="doSave()" style="background:#22c55e;border:1px solid #22c55e;color:#05210f;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:600">Save</button>
    </div>
  </div>
</div>

<script>
var MAP = [
  "xrrxxxxxxxxrrx",   // 0: screens at 1,2 and 11,12
  "xsxxxxppxxxssx",   // 1: seat@1, podium@6-7, seats@11-12 (under screen R)
  "xxxxxxxxxxxxxq",   // 2: EXIT@13 (below podium, above row A)
  "sssxssssssxsss",   // 3: Row A
  "sssxssssssxsss",   // 4: Row B
  "sssxssssssxsss",   // 5: Row C
  "sssxssssssxsss",   // 6: Row D
  "sssxssssssxsss",   // 7: Row E
  "sssxssssssxsss",   // 8: Row F
  "sssxssssssxsss",   // 9: Row G
  "sssxssssssxsss",   // 10: Row H
  "sssxssssssxsss",   // 11: Row I
  "sssxssssssxsss",   // 12: Row J
  "sssxssssssxsss",   // 13: Row K
  "sssxssssssxsss",   // 14: Row L
  "xxxxxxxxxxxxxx",   // 15: corridor
  "xxxxxxxxxxxxxx",   // 16: corridor
  "qxxxxtxxtxvvvx",   // 17: EXIT@0, TATIB@5&8, AV@10-12 (doors replaced with x)
  "wwwwwwwwwwwwww",   // 18: wall
  "xsxsxpxxxxxxxx",   // 19: R2 front row + podium
  "sssssxxxxxxxxx",   // 20: R2-A
  "sssssxxxxxxxxx",   // 21: R2-B
  "sssssxxxxxxxxx",   // 22: R2-C
  "sssssxxxxxxxxx",   // 23: R2-D
  "sssssxxxxxxxxx"    // 24: R2-E
];
var ROWS = MAP.length, COLS = 14;
var STORAGE_KEY = 'cinema_venue_v14';
var reservations = {};
try { reservations = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) {}

// Row visibility – A-L (map rows 3-14). hiddenRows is a Set of letters to HIDE.
var ALL_ROW_LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
var HIDDEN_KEY = 'cinema_hidden_rows_v14';
var hiddenRows = new Set();
try {
  var stored = JSON.parse(localStorage.getItem(HIDDEN_KEY) || '[]');
  stored.forEach(function(l){ hiddenRows.add(l); });
} catch(e) {}

// Temp state while dropdown is open
var tempHidden = new Set();

var MERGE_GROUPS = [
  { row:0, minCol:1,  maxCol:2,  label:'SCREEN L', cls:'screen-block' },
  { row:0, minCol:11, maxCol:12, label:'SCREEN R', cls:'screen-block' },
  { row:1, minCol:6,  maxCol:7,  label:'PODIUM',   cls:'podium-block' }
];

var LABEL_COLS = [3, 10];

var currentPOV = 'av';
var currentSeat = null;
var floorEl = document.getElementById('floor');
var povTitle = document.getElementById('povTitle');
var navAvBtn = document.getElementById('navAvPov');
var navPodiumBtn = document.getElementById('navPodiumPov');
var modalOverlay = document.getElementById('modalOverlay');
var modalBox = document.getElementById('modalBox');
var nameInput = document.getElementById('nameInput');
var modalTitle = document.getElementById('modalTitle');
var clearBtnEl = document.getElementById('clearBtn');

function switchPOV(pov) {
  currentPOV = pov;
  var resetBtn = document.getElementById('resetBtn');
  var rowVisBtn = document.getElementById('rowVisBtn');
  if (pov === 'av') {
    povTitle.textContent = ' AV';
    povTitle.className = 'pov-title av';
    navAvBtn.style.background = '#1c2d48';
    navAvBtn.style.color = '#8fc8ff';
    navAvBtn.style.borderColor = '#2c4a78';
    navPodiumBtn.style.background = '#1d2331';
    navPodiumBtn.style.color = '#b9c2d5';
    navPodiumBtn.style.borderColor = '#2c3448';
    resetBtn.style.display = '';
    rowVisBtn.style.display = '';
  } else {
    povTitle.textContent = '🎥 PODIUM';
    povTitle.className = 'pov-title podium';
    navPodiumBtn.style.background = '#3b2336';
    navPodiumBtn.style.color = '#f5a9d0';
    navPodiumBtn.style.borderColor = '#5c3050';
    navAvBtn.style.background = '#1d2331';
    navAvBtn.style.color = '#b9c2d5';
    navAvBtn.style.borderColor = '#2c3448';
    resetBtn.style.display = 'none';
    rowVisBtn.style.display = 'none';
  }
  render();
}

function getMergeGroup(r, c) {
  for (var i = 0; i < MERGE_GROUPS.length; i++) {
    var g = MERGE_GROUPS[i];
    if (r === g.row && c >= g.minCol && c <= g.maxCol) return g;
  }
  return null;
}

function getCellInfo(r, origC) {
  // Row letters at aisle cols 3 and 10, rows 3-14
  if (r >= 3 && r <= 14 && LABEL_COLS.indexOf(origC) !== -1) {
    return { type: 'label', label: String.fromCharCode(65 + r - 3) };
  }

  var ch = MAP[r] ? MAP[r][origC] : null;
  if (!ch || ch === 'x') return { type: 'space' };
  if (ch === 'w') return { type: 'wall' };
  if (ch === 'q') return { type: 'static', cls: 'exit-q', label: 'EXIT' };
  if (ch === 'd') return { type: 'static', cls: 'door', label: 'DOOR' };

  var mg = getMergeGroup(r, origC);
  if (mg) return { type: 'merge', group: mg, isStart: origC === mg.minCol };

  // Row 1 seats: col 1 (under screen L, labeled "x"), cols 11-12 (under screen R, labeled 1,2)
  if (r === 1 && ch === 's') {
    if (origC === 1) {
      return { type: 'seat', id: 'TOP-L', label: 'x' };
    } else if (origC === 11 || origC === 12) {
      var pos = origC - 10;
      return { type: 'seat', id: 'TOP-R' + pos, label: String(pos) };
    }
  }

  // Main hall seats (rows 3-14)
  if (ch === 's' && r >= 3 && r <= 14) {
    var seatCols = [0,1,2,4,5,6,7,8,9,11,12,13];
    var idx = seatCols.indexOf(origC);
    if (idx !== -1) {
      var id = String.fromCharCode(65 + r - 3) + (idx + 1);
      return { type: 'seat', id: id, label: String(idx + 1) };
    }
  }

  // TATIB at row 17, cols 5 and 8
  if (ch === 't' && r === 17) {
    var tn = origC === 5 ? '1' : '2';
    return { type: 'seat', id: 'TATIB-' + tn, label: 'TATIB' };
  }
  // AV at row 17, cols 10, 11, 12
  if (ch === 'v' && r === 17) {
    var an = String(origC - 9);
    return { type: 'seat', id: 'AV-' + an, label: 'AV' };
  }

  // Second room front seats (row 19, cols 1 & 3)
  if (r === 19 && ch === 's' && (origC === 1 || origC === 3)) {
    var sid = origC === 1 ? 'R2-F1' : 'R2-F2';
    return { type: 'seat', id: sid, label: 'S' };
  }

  // Second room podium (row 19, col 5)
  if (r === 19 && ch === 'p' && origC === 5) {
    return { type: 'r2podium', id: 'R2-PODIUM', label: 'PDM' };
  }

  // Second room seats (rows 20-24, cols 0-4)
  if (ch === 's' && r >= 20 && r <= 24 && origC <= 4) {
    var rl = ['A','B','C','D','E'][r - 20];
    var rid = 'R2-' + rl + (origC + 1);
    return { type: 'seat', id: rid, label: String(origC + 1) };
  }

  return { type: 'space' };
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isRowHidden(r) {
  // Main hall rows: 3-14 map to A-L
  if (r >= 3 && r <= 14) {
    return hiddenRows.has(String.fromCharCode(65 + r - 3));
  }
  return false;
}

// ---- Row visibility UI ----
function toggleRowVis() {
  var dd = document.getElementById('rowVisDropdown');
  if (dd.classList.contains('open')) {
    dd.classList.remove('open');
  } else {
    // Load current hidden into temp
    tempHidden = new Set(hiddenRows);
    renderRowVisList();
    dd.classList.add('open');
  }
}

function closeRowVis(e) {
  if (e) e.stopPropagation();
  document.getElementById('rowVisDropdown').classList.remove('open');
}

function selectAllRows(e) {
  if (e) e.stopPropagation();
  tempHidden = new Set();
  renderRowVisList();
}

function toggleRowItem(letter, e) {
  if (e) e.stopPropagation();
  if (tempHidden.has(letter)) {
    tempHidden.delete(letter);
  } else {
    tempHidden.add(letter);
  }
  renderRowVisList();
}

function renderRowVisList() {
  var list = document.getElementById('rowVisList');
  list.innerHTML = '';
  ALL_ROW_LETTERS.forEach(function(letter) {
    var item = document.createElement('div');
    item.className = 'row-vis-item' + (tempHidden.has(letter) ? '' : ' checked');
    item.textContent = letter;
    item.onclick = function(e) { toggleRowItem(letter, e); };
    list.appendChild(item);
  });
}

function applyRowVis(e) {
  if (e) e.stopPropagation();
  hiddenRows = new Set(tempHidden);
  try { localStorage.setItem(HIDDEN_KEY, JSON.stringify(Array.from(hiddenRows))); } catch(ex) {}
  document.getElementById('rowVisDropdown').classList.remove('open');
  render();
  showToast('Rows updated');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('rowVisBtn');
  var dd = document.getElementById('rowVisDropdown');
  if (dd.classList.contains('open') && !dd.contains(e.target) && e.target !== wrap) {
    dd.classList.remove('open');
  }
});

function render() {
  floorEl.innerHTML = '';
  var clickable = 0, reserved = 0;
  var isEditable = currentPOV === 'av';
  var isPodium = currentPOV === 'podium';
  var renderedMerges = {};
  var displayR = 0;

  for (var mapR = 0; mapR < ROWS; mapR++) {
    var r = isPodium ? (ROWS - 1 - mapR) : mapR;

    // Skip hidden rows (only main hall rows 3-14 can be hidden)
    if (isRowHidden(r)) continue;



    for (var displayC = 0; displayC < COLS; displayC++) {
      var origC = isPodium ? (COLS - 1 - displayC) : displayC;
      var info = getCellInfo(r, origC);

      if (info.type === 'merge') {
        var g = info.group;
        var mergeKey = g.row + '_' + g.minCol;
        if (!info.isStart) continue;
        if (renderedMerges[mergeKey]) continue;
        renderedMerges[mergeKey] = true;

        var startDC, span;
        if (isPodium) {
          startDC = COLS - 1 - g.maxCol;
          span = g.maxCol - g.minCol + 1;
        } else {
          startDC = g.minCol;
          span = g.maxCol - g.minCol + 1;
        }

        var el = document.createElement('div');
        el.className = 'cell merge ' + g.cls;
        el.style.gridColumn = (startDC + 1) + ' / ' + (startDC + 1 + span);
        el.style.gridRow = (displayR + 1) + ' / ' + (displayR + 2);
        el.style.width = 'auto';
        el.style.height = 'auto';
        el.textContent = g.label;
        floorEl.appendChild(el);
        continue;
      }

      var cell = document.createElement('div');
      cell.className = 'cell';

      if (info.type === 'seat') {
        clickable++;
        cell.classList.add('seat');
        if (!isEditable) cell.classList.add('readonly');
        var nm = reservations[info.id];
        if (nm) {
          reserved++;
          cell.classList.add('filled');
          // Dynamic font size to fit name on one line (optimized for 32px mobile cells)
          var nameLen = nm.length;
          var fontSize;
          if (nameLen <= 4) fontSize = 0.45;
          else if (nameLen <= 6) fontSize = 0.38;
          else if (nameLen <= 8) fontSize = 0.32;
          else if (nameLen <= 10) fontSize = 0.28;
          else if (nameLen <= 12) fontSize = 0.24;
          else fontSize = 0.20;
          cell.innerHTML = '<span class="nm" style="font-size:' + fontSize.toFixed(2) + 'rem">' + escHtml(nm) + '</span>';
          cell.title = info.id + ' – ' + nm;
          
          // In podium view, make filled seats clickable to show name
          if (!isEditable) {
            (function(sid, name) {
              cell.style.cursor = 'pointer';
              cell.onclick = function(e) {
                e.stopPropagation();
                showNamePopup(sid, name);
              };
            })(info.id, nm);
          }
        } else {
          cell.textContent = info.label;
          cell.title = info.id;
        }
        if (isEditable) {
          (function(sid) {
            cell.onclick = function(e) {
              e.stopPropagation();
              openModal(sid);
            };
          })(info.id);
        }
      } else if (info.type === 'label') {
        cell.classList.add('label-row');
        cell.textContent = info.label;
        cell.title = 'Row ' + info.label;
      } else if (info.type === 'static') {
        cell.classList.add(info.cls);
        cell.textContent = info.label;
      } else if (info.type === 'wall') {
        cell.classList.add('wall-row');
        var isDoorPos = (r === 18 && (origC === 6 || origC === 7));
        cell.innerHTML = '<div class="wall-line' + (isDoorPos ? ' door' : '') + '"></div>';
      } else if (info.type === 'r2podium') {
        cell.classList.add('r2-podium');
        cell.textContent = info.label;
        cell.title = info.id;
      } else {
        cell.classList.add('space');
      }

      floorEl.appendChild(cell);
    }
    displayR++;
  }
  document.getElementById('stats').textContent = reserved + ' / ' + clickable + ' reserved';
}

function openModal(id) {
  currentSeat = id;
  modalTitle.textContent = id;
  nameInput.value = reservations[id] || '';
  clearBtnEl.style.display = reservations[id] ? 'inline-block' : 'none';
  modalOverlay.style.display = 'flex';
  setTimeout(function() { nameInput.focus(); }, 100);
}

function doSave() {
  var sid = currentSeat;
  if (!sid) return;
  var v = nameInput.value.trim();
  if (v) {
    reservations[sid] = v;
  } else {
    delete reservations[sid];
  }
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations)); } catch(e) {}
  modalOverlay.style.display = 'none';
  currentSeat = null;
  render();
}

function doCancel() {
  modalOverlay.style.display = 'none';
  currentSeat = null;
}

// Name popup for podium view - shows name in uppercase
function showNamePopup(id, name) {
  document.getElementById('namePopupText').textContent = name.toUpperCase();
  document.getElementById('namePopupSeatId').textContent = id;
  document.getElementById('namePopupOverlay').classList.add('open');
}

function closeNamePopup() {
  document.getElementById('namePopupOverlay').classList.remove('open');
}

function doClear() {
  if (currentSeat) {
    delete reservations[currentSeat];
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(reservations)); } catch(e) {}
    modalOverlay.style.display = 'none';
    currentSeat = null;
    render();
  }
}

function doReset() {
  var el = document.getElementById('resetConfirm');
  el.style.display = 'block';
}

function confirmReset() {
  reservations = {};
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  document.getElementById('resetConfirm').style.display = 'none';
  render();
  showToast('All cleared');
}

function cancelReset() {
  document.getElementById('resetConfirm').style.display = 'none';
}

var fitted = false;
document.getElementById('fitBtn').onclick = function() {
  fitted = !fitted;
  var board = document.getElementById('board');
  var w = floorEl.scrollWidth;
  if (fitted) {
    var scale = Math.min(1, (board.clientWidth - 32) / w);
    floorEl.style.transform = 'scale(' + scale + ')';
    floorEl.style.transformOrigin = 'top center';
    this.textContent = '100%';
  } else {
    floorEl.style.transform = '';
    this.textContent = 'Fit to screen';
  }
};

var toastTimer;
function showToast(m) {
  var t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 1600);
}

render();
</script>
</body>
</html>
