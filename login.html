<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TangCi — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, #0b0d14 0%, #11131a 100%); color: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; -webkit-font-smoothing: antialiased; }
  .card { position: relative; width: 100%; max-width: 380px; background: rgba(23,26,39,0.9); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.07); border-radius: 28px; padding: 48px 36px; text-align: center; box-shadow: 0 32px 80px rgba(0,0,0,0.6); overflow: hidden; }
  .live-badge { position: absolute; top: 20px; left: 20px; display: inline-flex; align-items: center; gap: 6px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; padding: 4px 10px; border-radius: 999px; font-size: .65rem; font-weight: 700; letter-spacing: .08em; }
  .live-badge::before { content: ''; width: 5px; height: 5px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 6px rgba(74,222,128,0.6); animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .app-icon { width: 48px; height: 48px; border-radius: 14px; margin: 0 auto 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
  h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.035em; margin-bottom: 4px; color: #fff; }
  .sub { color: #9ca3af; font-size: .88rem; letter-spacing: 0.01em; margin-bottom: 40px; }
  .btn-gmail { display: inline-flex; align-items: center; justify-content: center; gap: 14px; width: 100%; padding: 16px 24px; background: #fff; color: #0f1117; border: none; border-radius: 14px; font-size: 1rem; font-weight: 800; cursor: pointer; box-shadow: 0 8px 30px rgba(0,0,0,0.35); transition: transform .1s ease, box-shadow .2s ease; }
  .btn-gmail:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
  .btn-gmail:active { transform: translateY(0); }
  .gmail-logo { width: 22px; height: 22px; flex-shrink: 0; }
  footer { margin-top: 28px; font-size: .7rem; color: #374151; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="card">
  <div class="live-badge">LIVE</div>
  <img class="app-icon" src="https://raw.githubusercontent.com/Schzium/tangci/main/icon-512-3d.png" alt="TangCi icon" onerror="this.style.display='none'">
  <h1>TangCi</h1>
  <p class="sub">Mobile App</p>

  <button class="btn-gmail" onclick="signInApp()">Sign-in with Gmail</button>

  <footer></footer>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBr8O17DKvHN1YnukjOkyus_Dsz3J2rLiA",
  authDomain: "tangci.firebaseapp.com",
  projectId: "tangci",
  storageBucket: "tangci.firebasestorage.app",
  messagingSenderId: "70249432757",
  appId: "1:70249432757:web:081a59a124e71ad501e0fc",
  measurementId: "G-4GJELW4XG5"
};

firebase.initializeApp(FIREBASE_CONFIG);
var auth = firebase.auth();

function signInApp() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).then(function() {
    sessionStorage.setItem('tangci_logged_in', '1');
    window.location.href = 'index.html';
  }).catch(function(err) {
    alert('Login gagal: ' + err.message);
  });
}
</script>
